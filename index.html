<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふんわりカレンダー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1.2">
</head>
<body>
    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prevMonth" class="nav-btn">&lt;</button>
            <h2 id="monthYear" class="month-year">2026年 5月</h2>
            <button id="nextMonth" class="nav-btn">&gt;</button>
        </div>
        
        <div class="calendar-weekdays">
            <div>日</div>
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
        </div>
        
        <div id="calendarDays" class="calendar-days">
            <!-- JavaScriptで動的に生成 -->
        </div>
    </div>

    <!-- 予定管理モーダル -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="selectedDateText">2026年 5月 15日</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="event-list" id="eventList">
                <!-- 予定がここに表示される -->
            </div>
            <div class="event-form">
                <input type="text" id="eventTitle" placeholder="なにする？✨">
                <button id="addEventBtn">きめる</button>
            </div>
        </div>
    </div>

    <!-- 季節のキャラクター -->
    <div id="seasonalCharacterContainer" class="character-container">
        <div id="speechBubble" class="speech-bubble">
            <p id="todayEventsText">今日の予定をチェック中...</p>
        </div>
        <div id="characterEmoji" class="character-emoji">🐾</div>
    </div>

    <script src="script.js?v=1.1.2"></script>
</body>
</html>
